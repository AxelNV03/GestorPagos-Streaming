<!-- Modal visor de pagos -->
<div id="visorComprobanteModal" class="up-mgr-overlay" style="display: none;">
    <div class="up-mgr-card">
        <div class="up-mgr-header">

            <div id="nota-icono-modal" class="nota-trigger" onclick="abrirVisorNota(this)" data-nota="">
                <i id="icono-alerta" class="bi bi-exclamation-circle-fill text-dark" style="font-size: 1.2rem; cursor: pointer; display: none;"></i>
                
                <i id="icono-mensaje" class="bi bi-chat-left-text-fill text-primary" style="font-size: 1.2rem; cursor: pointer; opacity: none; display: none;"></i>
            </div>

            <div class="d-flex align-items-center gap-2">
                <span style="font-weight: 700; color: #334155;">Revisión Comprobante</span>
            </div>

            <button onclick="cerrarVisor()" style="background:none; border:none; cursor:pointer; font-size:24px; color: #94a3b8;">&times;</button>
        </div>


        

        <div class="up-mgr-info-box">
            <div>
                <span class="up-mgr-label">Usuario</span>
                <span class="up-mgr-value" id="visor-user">---</span>
            </div>
            <div style="text-align: right;">
                <span class="up-mgr-label">Monto mensual</span>
                <span class="up-mgr-value" style="color: #020700;">$<span id="visor-amount">0.00</span></span>
            </div>
        </div>

        <div class="up-mgr-body">
            <div class="cvp-wrapper-centrado">
                <img id="imgComprobanteVisor" 
                    src="" 
                    alt="Comprobante" 
                    class="cvp-img-centrada" 
                    onclick="expandirImagen(this)" 
                    style="cursor: zoom-in; transition: transform 0.2s;" 
                    title="Haga clic para pantalla completa">
            </div>

            <div id="visor-acciones" style="display: none;">
                
                <form id="form-gestion-pago" method="POST" style="width: 100%; margin: 0;">
                    <label class="up-mgr-label" style="display: block; text-align: left; margin-bottom: 8px; font-weight: 700; color: #334155;">MESES A CUBRIR</label>
                    <select id="visor-meses" class="up-mgr-input" name="meses" 
                            style="width: 100%; margin-bottom: 20px; font-weight: 700; border: 1px solid #000; background: #fff; border-radius: 10px; padding: 10px; color: #000;">
                        <option value="1">1 Mes</option>
                        <option value="2">2 Meses</option>
                        <option value="3">3 Meses</option>
                        <option value="4">4 Meses</option>
                        <option value="5">5 Meses</option>
                        <option value="6">6 Meses</option>
                    </select>

                    <div class="up-mgr-footer" style="padding: 0; border: none; gap: 12px; display: flex;">
                        <button type="button" class="up-mgr-btn" 
                                style="background: #fff; border: 1px solid #000; color: #000; flex: 1; font-weight: 700; border-radius: 12px;" 
                                onclick="procesarPago('rechazar')">
                            <i class="bi bi-x-lg"></i> Rechazar
                        </button>
                        <button type="button" class="up-mgr-btn" 
                                style="background: #000; border: 1px solid #000; color: #fff; flex: 1; font-weight: 700; border-radius: 12px;" 
                                onclick="procesarPago('aprobar')">
                            <i class="bi bi-check-lg"></i> Aprobar Pago
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="up-mgr-footer">
            <button type="button" class="up-mgr-btn up-mgr-btn-cancel" style="width: 100%; border-radius: 12px;" onclick="cerrarVisor()">Cerrar</button>
        </div>
    </div>
</div>
