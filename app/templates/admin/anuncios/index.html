{% extends "layouts/admin.html" %}
{% block main_content %}
<h2>📢 Enviar Aviso General</h2>

{% include "admin/alerts.html" %}

<div class="card-filters shadow-sm" style="margin-top: 20px;">
    <form method="POST">
        <div class="form-group" style="margin-bottom: 15px;">
            <label style="font-weight: 600; display: block; margin-bottom: 5px;">Mensaje</label>
            <textarea name="mensaje" class="minimal-input" rows="4" placeholder="Escribe el aviso que se enviará a todos los usuarios..." required style="width: 100%;"></textarea>
        </div>
        <button type="submit" class="btn-filter">
            <i class="bi bi-send"></i> Enviar anuncio
        </button>
    </form>
</div>
{% endblock %}
