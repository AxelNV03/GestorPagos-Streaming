<!-- MODAL NUEVO COMPROBANTE -->
<div class="cpc-modal-overlay" id="modalNuevoComprobante">
    <div class="cpc-modal-content">
        <div class="cpc-modal-header">
            <h5><i class="bi bi-cloud-upload"></i> Subir Comprobante</h5>
            <button type="button" class="cpc-modal-close" onclick="cerrarModalNuevoComprobante()">&times;</button>
        </div>

        <form id="formNuevoComprobante" method="POST" action="{{ url_for('admin.subir_comprobante') }}" enctype="multipart/form-data">
            <div class="cpc-modal-body">
                
                <!-- Imagen -->
                <div class="cpc-form-group">
                    <label>Comprobante</label>
                    <div class="cpc-file-upload">
                        <input type="file" name="archivo" id="cpc_file_input" accept="image/*" required>
                        <label for="cpc_file_input" class="cpc-file-label">
                            <i class="bi bi-image"></i>
                            <span id="cpc_file_name">Seleccionar imagen...</span>
                        </label>
                    </div>
                    <small class="cpc-help-text">Formatos: JPG, PNG. Máximo 5MB</small>
                </div>

                <!-- Nota -->
                <div class="cpc-form-group">
                    <label>Nota (opcional)</label>
                    <textarea name="nota" class="cpc-form-textarea" rows="2" placeholder="Ej: Pago de Netflix y Disney+"></textarea>
                </div>

                <!-- Usuario -->
                <div class="cpc-form-group">
                    <label>Usuario</label>
                    <select name="usuario_id" class="cpc-form-select" required>
                        <option value="">Seleccionar usuario...</option>
                        {% for u in usuarios %}
                            <option value="{{ u.id }}">{{ u.nombres }} {{ u.apeP }}</option>
                        {% endfor %}
                    </select>
                </div>

            </div>
            <div class="cpc-modal-footer">
                <button type="button" class="cpc-btn-cancel" onclick="cerrarModalNuevoComprobante()">Cancelar</button>
                <button type="submit" class="cpc-btn-save">
                    <i class="bi bi-cloud-upload"></i> Subir
                </button>
            </div>
        </form>
    </div>
</div>
