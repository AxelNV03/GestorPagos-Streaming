<!-- Barra de busqueda -->
    <div class="card-filters shadow-sm mb-4">
        <form class="filter-form" action="{{ url_for('admin.cobros') }}" method="get">
            
            <div class="filter-group buscador">
                <span class="filter-label">Busqueda</span>
                <div class="input-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" name="query" class="minimal-input with-icon" placeholder="Buscar usuario..." value="{{ filtros_usados.get('query', '') }}">
                </div>
            </div>
            
            <div class="filter-group small">
                <span class="filter-label">Estado</span>
                <select name="estado" class="minimal-input">
                    {% set estados = [
                        ('', 'Todos'),
                        ('pendiente', 'Pendiente'),
                        ('pagado', 'Pagado')
                    ] %}
                    {% set estado_seleccionado = filtros_usados.get('estado', 'pendiente') %}
                    {% for valor, nombre in estados %}
                        <option value="{{ valor }}" {{ 'selected' if estado_seleccionado == valor }}>
                            {{ nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="filter-group plataforma">
                <span class="filter-label">Plataforma</span>
                <select name="plataforma_id" class="minimal-input">
                    <option value="">Todas</option>
                    {% set plataforma_seleccionada = filtros_usados.get('plataforma_id')|int %}
                    {% for p in listaPlataformas %}
                        <option value="{{ p.id }}" {{ 'selected' if plataforma_seleccionada == p.id }}>
                            {{ p.nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>



            <div class="filter-group small">
                <span class="filter-label">Mes</span>
                <select name="mes" class="minimal-input">
                    <option value="">Todos</option>
                    {% set meses = [
                        (1, 'Enero'), (2, 'Febrero'), (3, 'Marzo'), (4, 'Abril'),
                        (5, 'Mayo'), (6, 'Junio'), (7, 'Julio'), (8, 'Agosto'),
                        (9, 'Septiembre'), (10, 'Octubre'), (11, 'Noviembre'), (12, 'Diciembre')
                    ] %}
                    {% set mes_seleccionado = (filtros_usados.get('mes') or mes_actual)|int %}
                    {% for num, nombre in meses %}
                        <option value="{{ num }}" {{ 'selected' if mes_seleccionado == num }}>
                                {{ nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        


            <div class="filter-group small">
                <span class="filter-label">Año</span>
                <select name="anio" class="minimal-input">
                    {% set anio_seleccionado = (filtros_usados.get('anio') or anio_actual)|int %}
                    {% for anio in range(2026, 2040) %}
                        <option value="{{ anio }}" {{ 'selected' if anio_seleccionado == anio }}>
                            {{ anio }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
        
        
            <div class="filter-group-btn">
                <button type="submit" class="btn-filter">
                    <i class="bi bi-search"></i> Filtrar
                </button>
            </div>        
        </form>
    </div>

    <!-- Alerts -->
{% include "admin/alerts.html" %}
