<div id="modalUsuario" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle"><i class="bi bi-pencil-square"></i> Editar Usuario</h3>
            <span class="close" onclick="cerrarModal()">&times;</span>
        </div>
        <form id="formUsuario" action="{{ url_for('admin.guardar_usuario') }}" method="POST" enctype="multipart/form-data">
            <div class="form-body" style="overflow-y: auto; max-height: 60vh; padding-right: 10px;">

                <!-- ID del Usuario -->
                <input type="hidden" name="usuario_id" id="form_usuario_id">

                <!-- Nombres y Apellidos -->
                <div class="form-group">
                    <label for="nombres">Nombre(s)</label>
                    <input type="text" name="nombres" id="form_nombres" placeholder="Ingrese los nombres(s) del usuario">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="apeP">Apellido Paterno</label>
                        <input type="text" name="apeP" id="form_apeP" placeholder="Ingrese el apellido del usuario">
                    </div>
                    <div class="form-group">
                        <label for="apeM">Apellido Materno</label>
                        <input type="text" name="apeM" id="form_apeM" placeholder="Ingrese el apellido del usuario">
                    </div>
                </div>

                <!-- Teléfono y Correo -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="text" name="telefono" id="form_telefono" placeholder="Ingrese el teléfono del usuario">
                    </div>
                    <div class="form-group">
                        <label for="correo">Correo del Usuario</label>
                        <input type="email" name="correo" id="form_correo" placeholder="ejemplo@netflix.com">
                    </div>
                </div>

                <!-- Plataformas -->
                <div class="form-group">
                    <label>
                        <i class="bi bi-play-circle-fill"></i> Plataformas del Usuario
                    </label>
                    
                    <div id="contenedor-plataformas"></div>
                    
                    <button type="button" class="btn-secondary" id="btn-agregar-plataforma">
                        Vincular Plataforma
                    </button>
                </div>

                <template id="molde-plataforma">
                    <div class="fila-plataforma">
                        <div class="form-group">
                            <select name="plataformas[]" class="form-select" required>
                                <option value="" disabled selected>-- Elige una plataforma --</option>
                                {% for plat in listaPlataformas %}
                                    <option value="{{ plat.id }}">{{ plat.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button type="button" class="btn-action delete btn-quitar-plataforma btn-plat-delete">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </template>
            </div>
            
            <!-- Botones del Formulario -->
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn-primary" id="btnGuardar">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
